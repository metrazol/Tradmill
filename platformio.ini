; ============================================================
; PlatformIO project for the Tradmill ESP32 firmware.
;
; The Arduino sketch lives in boards/Tradmill/ (src_dir below), so the
; existing Arduino IDE workflow still works unchanged.  Each [env:*]
; selects a hardware target via a -D BOARD_* build flag, which overrides
; the default in board_select.h.
;
; Build / upload a specific target, e.g.:
;   pio run -e dis08070h
;   pio run -e dis08070h -t upload
; ============================================================

[platformio]
src_dir = boards/Tradmill
default_envs = dis08070h

; ---- Settings shared by every ESP32-S3 target --------------------------------
[env]
platform = espressif32
framework = arduino
board = esp32-s3-devkitc-1
monitor_speed = 115200

; LVGL needs to find lv_conf.h (kept in boards/Tradmill/ alongside the sketch).
; LV_CONF_INCLUDE_SIMPLE makes LVGL #include "lv_conf.h" via the include path.
build_flags =
    -D LV_CONF_INCLUDE_SIMPLE
    -I boards/Tradmill

; Libraries common to all boards.  WiFi / HTTPClient / ArduinoOTA / Wire ship
; with the ESP32 Arduino core and need no entry here.
lib_deps =
    lvgl/lvgl@^8.4.0
    adafruit/Adafruit MCP23017 Arduino Library@^2.3.2

; ---- Elecrow CrowPanel 7" DIS08070H (800x480 RGB + GT911 touch) --------------
[env:dis08070h]
build_flags =
    ${env.build_flags}
    -D BOARD_DIS08070H
    -D BOARD_HAS_PSRAM
    -D CORE_DEBUG_LEVEL=4          ; emit ESP_LOGI/log_i over UART0 for touch diag
    -D ARDUINO_USB_CDC_ON_BOOT=0   ; touch shares GPIO19/20 with the USB PHY
lib_deps =
    ${env.lib_deps}
    lovyan03/LovyanGFX@^1.1.16
; N4R8 module: 4MB flash, 8MB Octal PSRAM
board_build.flash_mode = qio
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 4MB
board_build.partitions = default.csv

; ---- Smartpanel ZX2D80CE02S (240x320 ST7789 8080 parallel + FT5x06 touch) ----
[env:zx2d80ce02s]
build_flags =
    ${env.build_flags}
    -D BOARD_ZX2D80CE02S
lib_deps =
    ${env.lib_deps}
    lovyan03/LovyanGFX@^1.1.16

; ---- AITRIP/Sunton CYD ESP32-2432S028R (240x320 ILI9341 SPI + XPT2046 touch) -
; Classic ESP32-WROOM-32 (not S3), 4MB flash, no PSRAM.  Overrides the S3 board
; default from [env].
[env:esp32_2432s028r]
board = esp32dev
build_flags =
    ${env.build_flags}
    -D BOARD_ESP32_2432S028R
lib_deps =
    ${env.lib_deps}
    lovyan03/LovyanGFX@^1.1.16
board_upload.flash_size = 4MB
board_build.partitions = default.csv

; ---- CrowPanel 1.28" round (GC9A01 via SPI) ----------------------------------
[env:gc9a01]
build_flags =
    ${env.build_flags}
    -D BOARD_GC9A01
lib_deps =
    ${env.lib_deps}
    ; GFX Library for Arduino >= 1.5 needs Arduino-ESP32 core 3.x
    ; (esp32-hal-periman.h).  This platform ships core 2.0.17, so pin to the
    ; last 1.4.x release that builds against it.
    https://github.com/moononournation/Arduino_GFX.git#v1.4.9
